# ── Omgently Hyprpaper ────────────────────────────────────
# Tempatkan wallpaper di ~/.config/hypr/wallpapers/
# Preload untuk performa instant saat switch.

preload = ~/.config/hypr/wallpapers/default.jpg

# Terapkan ke semua monitor. Ganti "" dengan nama monitor
# spesifik jika multi-monitor (misal: DP-1, eDP-1).
wallpaper = , ~/.config/hypr/wallpapers/default.jpg

splash = false
ipc = off
