# ── Omgently Alacritty — Tokyo Night ─────────────────────
[window]
padding = { x = 12, y = 8 }
opacity = 0.92
decorations = "None"

[font]
size = 13.0
[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"
[font.bold]
style = "Bold"

[cursor]
style = { shape = "Block", blinking = "On" }

[colors.primary]
background = "#1a1b26"
foreground = "#a9b1d6"

[colors.cursor]
text = "#1a1b26"
cursor = "#c0caf5"

[colors.selection]
text = "#c0caf5"
background = "#7aa2f7"

[colors.normal]
black   = "#32344a"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#ad8ee6"
cyan    = "#449dab"
white   = "#787c99"

[colors.bright]
black   = "#444b6a"
red     = "#ff7a93"
green   = "#b9f27c"
yellow  = "#ff9e64"
blue    = "#7da6ff"
magenta = "#bb9af7"
cyan    = "#0db9d7"
white   = "#acb0d0"
