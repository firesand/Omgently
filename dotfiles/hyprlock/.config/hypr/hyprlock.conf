# ╔══════════════════════════════════════════════════════════╗
# ║           OMGENTLY — Hyprlock (Lock Screen)             ║
# ║                     Tokyo Night                         ║
# ╚══════════════════════════════════════════════════════════╝

general {
    grace = 3
    hide_cursor = true
    no_fade_in = false
    no_fade_out = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 6
    brightness = 0.6
    contrast = 0.9
    noise = 0.02
    vibrancy = 0.1
}

# ── Jam ───────────────────────────────────────────────────
label {
    monitor =
    text = $TIME
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    color = rgb(c0caf5)
    position = 0, 180
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgb(1a1b26)
}

# ── Tanggal ───────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:3600000] date '+%A, %d %B %Y'
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    color = rgb(a9b1d6)
    position = 0, 100
    halign = center
    valign = center
}

# ── Greeting ──────────────────────────────────────────────
label {
    monitor =
    text = Hi, $USER
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    color = rgb(7aa2f7)
    position = 0, -40
    halign = center
    valign = center
}

# ── Input Field ───────────────────────────────────────────
input-field {
    monitor =
    size = 280, 44
    outline_thickness = 2

    outer_color = rgb(414868)
    inner_color = rgb(24283b)
    font_color = rgb(a9b1d6)
    fade_on_empty = true
    fade_timeout = 2000

    placeholder_text = <i>Password...</i>
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true

    check_color = rgb(7aa2f7)
    fail_color = rgb(f7768e)
    fail_text = <i>Incorrect</i>
    fail_transition = 200

    capslock_color = rgb(e0af68)

    position = 0, -120
    halign = center
    valign = center

    shadow_passes = 1
    shadow_size = 4
    shadow_color = rgb(1a1b26)
}
