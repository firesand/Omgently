# ── Autostart ────────────────────────────────────────────
# Semua proses yang harus jalan sekali saat Hyprland start.

# Audio
exec-once = pipewire &
exec-once = wireplumber &

# Desktop components
exec-once = waybar &
exec-once = hyprpaper &
exec-once = mako &
exec-once = nm-applet --indicator &
exec-once = swayosd-server &

# Idle management (lock + screen off)
exec-once = hypridle &

# Clipboard history daemon
exec-once = wl-paste --type text --watch cliphist store &

# Polkit agent (path-agnostic)
exec-once = sh -c 'if [ -x /usr/libexec/lxqt-policykit-agent ]; then exec /usr/libexec/lxqt-policykit-agent; elif [ -x /usr/lib/lxqt-policykit-agent ]; then exec /usr/lib/lxqt-policykit-agent; fi' &
