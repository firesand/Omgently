# ── Window Rules ──────────────────────────────────────────

# Float dialogs dan popups secara otomatis
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, title:^(Save File)$
windowrulev2 = float, title:^(Confirm to replace files)$
windowrulev2 = float, title:^(File Operation Progress)$

# Opacity default (sedikit transparan untuk inactive)
windowrulev2 = opacity 0.95 0.88, class:^(.*)$

# Terminal dan editor: sedikit lebih transparan
windowrulev2 = opacity 0.92 0.85, class:^(ghostty)$
windowrulev2 = opacity 0.92 0.85, class:^(Alacritty)$
windowrulev2 = opacity 0.92 0.85, class:^(kitty)$

# Browser: opaque penuh
windowrulev2 = opacity 1.0 1.0, class:^(brave-browser)$
windowrulev2 = opacity 1.0 1.0, class:^(firefox)$

# Suppress maximize untuk semua window
windowrulev2 = suppressevent maximize, class:^(.*)$
