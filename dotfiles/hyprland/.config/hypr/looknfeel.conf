# ── General ───────────────────────────────────────────────
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = $accent $accent_alt 45deg
    col.inactive_border = $overlay
    layout = dwindle
    allow_tearing = false
}

# ── Decoration ────────────────────────────────────────────
decoration {
    rounding = 0

    blur {
        enabled = true
        size = 3
        passes = 2
        special = true
        brightness = 0.65
        contrast = 0.80
        noise = 0.02
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a2ecc)
    }
}

# ── Animations (Smooth & Snappy) ──────────────────────────
animations {
    enabled = true

    bezier = snappy, 0.05, 0.9, 0.1, 1.0
    bezier = smooth, 0.25, 1, 0.5, 1
    bezier = fade, 0.0, 0.0, 0.2, 1.0

    animation = windows, 1, 4, snappy, popin 80%
    animation = windowsOut, 1, 4, fade, popin 80%
    animation = border, 1, 8, smooth
    animation = fade, 1, 3, fade
    animation = workspaces, 1, 4, snappy, slidevert
}

# ── Layout ────────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}
